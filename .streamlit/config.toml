[theme]
base                     = "light"
primaryColor             = "#0d9488"
backgroundColor          = "#fafaf9"
secondaryBackgroundColor = "#f0fdf9"
textColor                = "#1c1917"
font                     = "sans serif"

[server]
headless             = true
enableCORS           = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
